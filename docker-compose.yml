services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: logo-db
    environment:
      ACCEPT_EULA: 'Y'
      SA_PASSWORD: 'YourStrong!Passw0rd'
      MSSQL_PID: 'Developer'
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - logo-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  seeder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logo-seeder
    environment:
      SEED_AND_EXIT: "true"
      ConnectionStrings__DefaultConnection: "Server=mssql,1433;Database=LogoVisualizer;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      Jwt__Issuer: "MasterApp"
      Jwt__Audience: "LogoVisualizer"
      Jwt__Key: "your-production-jwt-key-minimum-32-characters-long"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - logo-network
    restart: no


networks:
  logo-network:
    driver: bridge

volumes:
  sql_data:
    driver: local
